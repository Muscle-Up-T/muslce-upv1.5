<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="MuscleUp"/>
<meta name="theme-color" content="#080808"/>
<meta name="format-detection" content="telephone=no,date=no,email=no,address=no"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>MuscleUp</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<!-- Firebase SDK (compat — no build system needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
/* NUCLEAR SAFARI FIX — hardcode every color, use -webkit-text-fill-color */
a,a:any-link{color:#f0f0f0 !important;-webkit-text-fill-color:#f0f0f0 !important;text-decoration:none !important;}
[x-apple-data-detectors],[x-apple-data-detectors] *{color:inherit !important;-webkit-text-fill-color:inherit !important;text-decoration:none !important;pointer-events:none !important;}
html,body{height:100%;background:#0a0a0a;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;font-family:'DM Sans',sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:0;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
input,textarea,select{-webkit-appearance:none;appearance:none;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;background:#161616;font-family:'DM Sans',sans-serif;}
input::placeholder{color:#666 !important;-webkit-text-fill-color:#666 !important;opacity:1;}
input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 1000px #161616 inset !important;-webkit-text-fill-color:#f0f0f0 !important;}
button{-webkit-appearance:none;appearance:none;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;font-family:'DM Sans',sans-serif;background:none;border:none;}
:root{--accent:#4a9eff;--accent-glow:rgba(74,158,255,0.25);--accent-soft:rgba(74,158,255,0.1);--green:#34d399;--green-glow:rgba(52,211,153,0.25);}
@keyframes fadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes xpRise{0%{transform:translateY(0) translateX(-50%);opacity:1}100%{transform:translateY(-60px) translateX(-50%);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes levelUp{0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}30%{transform:translate(-50%,-50%) scale(1.2);opacity:1}60%{transform:translate(-50%,-50%) scale(0.95);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
@keyframes celebCard{0%{transform:translateY(30px) scale(0.9);opacity:0}40%{transform:translateY(-5px) scale(1.02);opacity:1}100%{transform:translateY(0) scale(1);opacity:0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:-webkit-fill-available;background:#0a0a0a;display:flex;flex-direction:column;}
/* AUTH */
#auth-screen{display:flex;flex-direction:column;justify-content:center;padding:48px 28px;min-height:100vh;animation:fadeUp 0.4s ease;}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:5px;line-height:1;margin-bottom:6px;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;}
.auth-logo span{opacity:0.2;}
.auth-tagline{font-size:12px;color:#888;-webkit-text-fill-color:#888;letter-spacing:3px;margin-bottom:40px;text-transform:uppercase;}
.auth-tabs{display:flex;background:#161616;border-radius:12px;padding:4px;margin-bottom:28px;gap:4px;}
.auth-tab{flex:1;background:none;border:none;color:#888;-webkit-text-fill-color:#888;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:11px;cursor:pointer;border-radius:9px;transition:all 0.2s;letter-spacing:0.5px;}
.auth-tab.active{background:#ffffff;color:#000000 !important;-webkit-text-fill-color:#000000 !important;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;color:#888;-webkit-text-fill-color:#888;letter-spacing:2px;margin-bottom:7px;text-transform:uppercase;font-weight:600;}
.field input{width:100%;background:#161616 !important;border:1.5px solid #2a2a2a;color:#f0f0f0 !important;-webkit-text-fill-color:#f0f0f0 !important;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:16px;padding:14px 16px;transition:border-color 0.2s;display:block;}
.field input:focus{outline:none;border-color:#ffffff;}
.err{font-size:12px;color:#ff4444;-webkit-text-fill-color:#ff4444;margin-top:10px;font-weight:500;min-height:18px;}
.ok{font-size:12px;color:#4caf50;-webkit-text-fill-color:#4caf50;margin-top:10px;font-weight:500;min-height:18px;}
.divider-or{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:#2a2a2a;}
.divider-or span{font-size:12px;color:#888;-webkit-text-fill-color:#888;font-weight:500;}
.guest-banner{background:#161616;border:1.5px dashed #2a2a2a;border-radius:14px;padding:16px;}
.guest-banner-title{font-size:14px;font-weight:700;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;margin-bottom:4px;}
.guest-banner-sub{font-size:12px;color:#888;-webkit-text-fill-color:#888;font-weight:500;margin-bottom:14px;line-height:1.5;}
/* BUTTONS */
.btn-primary{background:#ffffff;color:#000000 !important;-webkit-text-fill-color:#000000 !important;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;padding:16px 20px;cursor:pointer;width:100%;transition:transform 0.1s,opacity 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary:active{transform:scale(0.97);opacity:0.9;}
.btn-secondary{background:#1f1f1f;color:#f0f0f0 !important;-webkit-text-fill-color:#f0f0f0 !important;border:1.5px solid #2a2a2a;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;padding:13px 18px;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-secondary:active{background:#2a2a2a;}
.btn-outline{background:transparent;color:#f0f0f0 !important;-webkit-text-fill-color:#f0f0f0 !important;border:1.5px solid #2a2a2a;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;padding:11px 16px;cursor:pointer;transition:all 0.15s;}
.btn-outline.sel{background:#ffffff;color:#000000 !important;-webkit-text-fill-color:#000000 !important;border-color:#ffffff;}
.btn-ghost-white{background:transparent;color:#f0f0f0 !important;-webkit-text-fill-color:#f0f0f0 !important;border:1.5px solid #444;border-radius:14px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;padding:14px 20px;cursor:pointer;width:100%;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-ghost-white:active{background:#161616;}
.btn-danger{background:transparent;color:#ff4444 !important;-webkit-text-fill-color:#ff4444 !important;border:1.5px solid rgba(255,68,68,0.25);border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;padding:13px 18px;cursor:pointer;width:100%;transition:all 0.15s;}
.chip{background:#161616;border:1.5px solid #2a2a2a;border-radius:20px;padding:8px 16px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;color:#888 !important;-webkit-text-fill-color:#888 !important;transition:all 0.15s;white-space:nowrap;}
.chip.sel{background:var(--accent);color:#000000 !important;-webkit-text-fill-color:#000000 !important;border-color:var(--accent);}
.chip:active{transform:scale(0.96);}
/* LAYOUT */
#main-app{display:none;flex-direction:column;flex:1;}
#main-app.visible{display:flex;}
.header{padding:env(safe-area-inset-top,44px) 20px 16px;border-bottom:1px solid #2a2a2a;background:rgba(10,10,10,0.97);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;line-height:1;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;}
.logo span{opacity:0.2;}
.guest-badge{font-size:10px;background:#1f1f1f;border:1px solid #2a2a2a;border-radius:20px;padding:3px 10px;color:#888;-webkit-text-fill-color:#888;font-weight:600;letter-spacing:1px;margin-left:8px;vertical-align:middle;}
.xp-pill{background:#161616;border:1px solid #2a2a2a;border-radius:20px;padding:6px 14px;text-align:right;}
.xp-num{font-size:15px;font-weight:700;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;}
.xp-streak{font-size:11px;color:#888;-webkit-text-fill-color:#888;margin-top:1px;font-weight:500;}
.xp-bar-track{margin-top:12px;height:4px;background:#1f1f1f;border-radius:4px;}
.xp-bar-fill{height:4px;background:linear-gradient(90deg,var(--accent),#7cc4ff);border-radius:4px;transition:width 0.6s ease;box-shadow:0 0 8px var(--accent-glow);}
.xp-lbl{font-size:10px;color:#666;-webkit-text-fill-color:#666;margin-top:5px;font-weight:500;}
.content{flex:1;overflow-y:auto;padding:20px 20px 110px;-webkit-overflow-scrolling:touch;}
.fade{animation:fadeUp 0.25s ease;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,10,0.98);backdrop-filter:blur(24px);border-top:1px solid #2a2a2a;display:flex;justify-content:space-around;padding:10px 8px;padding-bottom:calc(10px + env(safe-area-inset-bottom,16px));z-index:100;}
.nav-btn{background:none !important;border:none !important;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;color:#666 !important;-webkit-text-fill-color:#666 !important;font-family:'DM Sans',sans-serif;transition:color 0.2s;min-width:56px;padding:4px 0;-webkit-appearance:none;text-decoration:none !important;}
.nav-btn .nav-label{color:#666 !important;-webkit-text-fill-color:#666 !important;font-size:10px;font-weight:600;letter-spacing:0.5px;}
.nav-btn.active{color:#ffffff !important;-webkit-text-fill-color:#ffffff !important;}
.nav-btn.active .nav-label{color:#ffffff !important;-webkit-text-fill-color:#ffffff !important;}
.nav-icon{font-size:22px;line-height:1;}
/* CARDS */
.card{background:#161616;border:1px solid #2a2a2a;border-radius:16px;padding:18px;margin-bottom:12px;}
.section-lbl{font-size:11px;color:#888;-webkit-text-fill-color:#888;letter-spacing:2px;margin-bottom:14px;font-weight:600;text-transform:uppercase;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
.stat-cell{background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:16px 10px;text-align:center;transition:transform 0.1s,border-color 0.2s;}.stat-cell:active{transform:scale(0.97);border-color:#444;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;}
.stat-key{font-size:10px;color:#888;-webkit-text-fill-color:#888;letter-spacing:1px;margin-top:3px;font-weight:600;text-transform:uppercase;}
.workout-row{background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s;}
.workout-row:active{border-color:#ffffff;}
.set-tag{border:1.5px solid #2a2a2a;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;transition:all 0.12s;color:#888 !important;-webkit-text-fill-color:#888 !important;display:inline-block;margin:3px;font-weight:500;}
.set-tag.done{border-color:var(--accent);color:var(--accent) !important;-webkit-text-fill-color:var(--accent) !important;background:var(--accent-soft);}
.text-input{width:100%;background:#161616 !important;border:1.5px solid #2a2a2a;color:#f0f0f0 !important;-webkit-text-fill-color:#f0f0f0 !important;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;padding:14px 16px;transition:border-color 0.2s;display:block;}
.text-input:focus{outline:none;border-color:#ffffff;}
.num-input{width:62px;text-align:center;background:#161616 !important;border:1.5px solid #2a2a2a;color:#f0f0f0 !important;-webkit-text-fill-color:#f0f0f0 !important;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:10px 6px;transition:border-color 0.2s;}
.num-input:focus{outline:none;border-color:#ffffff;}
.xp-popup{position:fixed;top:76px;left:50%;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;background:var(--accent);color:#000000;-webkit-text-fill-color:#000000;padding:8px 20px;border-radius:20px;z-index:999;animation:xpRise 1.4s ease forwards;pointer-events:none;box-shadow:0 4px 20px var(--accent-glow);}
.levelup-popup{position:fixed;top:50%;left:50%;font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;color:var(--accent);-webkit-text-fill-color:var(--accent);z-index:999;animation:levelUp 2s ease forwards;pointer-events:none;text-shadow:0 0 30px var(--accent-glow),0 0 60px var(--accent-glow);}
.celeb-card{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#161616;border:2px solid var(--green);border-radius:24px;padding:36px;z-index:998;text-align:center;animation:celebCard 2.5s ease forwards;pointer-events:none;box-shadow:0 0 40px var(--green-glow);min-width:280px;}
.streak-fire{display:inline-block;}.streak-fire.active{animation:pulse 1.5s ease infinite;}
.ex-block{background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:16px;margin-bottom:12px;}
.stepper-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.stepper{display:flex;align-items:center;background:#0f0f0f;border:1.5px solid #2a2a2a;border-radius:12px;overflow:hidden;flex:1;}
.stepper-btn{background:none;border:none;color:#888;-webkit-text-fill-color:#888;font-size:20px;font-weight:300;width:40px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.1s;}
.stepper-btn:active{background:#2a2a2a;color:#fff;-webkit-text-fill-color:#fff;}
.stepper-val{flex:1;text-align:center;font-size:15px;font-weight:700;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;background:none;border:none;width:100%;padding:0;outline:none;font-family:'DM Sans',sans-serif;}
.stepper-lbl{font-size:11px;color:#666;-webkit-text-fill-color:#666;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;width:28px;text-align:center;flex-shrink:0;}
.set-num{font-size:11px;color:#666;-webkit-text-fill-color:#666;font-weight:700;width:22px;flex-shrink:0;text-align:center;}
.rm-set-btn{background:none;border:none;color:#444;-webkit-text-fill-color:#444;cursor:pointer;font-size:18px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color 0.1s;}
.rm-set-btn:active{color:#ff4444;-webkit-text-fill-color:#ff4444;}
.tag-pill{font-size:12px;border:1px solid #2a2a2a;border-radius:20px;padding:4px 11px;color:#888;-webkit-text-fill-color:#888;display:inline-block;margin:3px;font-weight:500;}
.level-card{border:1.5px solid #2a2a2a;border-radius:14px;padding:18px;margin-bottom:10px;cursor:pointer;transition:all 0.15s;background:#0a0a0a;}
.level-card.sel{border-color:#ffffff;background:#161616;}
.level-card:active{transform:scale(0.98);}
/* RIVALS */
.rival-row{background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.rival-row.me{border-color:#ffffff;background:rgba(255,255,255,0.03);}
.rival-row.friend{border-color:rgba(74,158,255,0.3);background:rgba(74,158,255,0.03);}
.friend-tag{font-size:10px;background:rgba(74,158,255,0.15);color:#4a9eff;-webkit-text-fill-color:#4a9eff;border-radius:20px;padding:2px 8px;font-weight:600;letter-spacing:0.5px;margin-left:6px;}
.add-friend-box{background:#161616;border:1.5px dashed #2a2a2a;border-radius:14px;padding:18px;margin-bottom:12px;}
.friend-chip{background:#1f1f1f;border:1px solid #2a2a2a;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:8px;margin:4px;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;}
.friend-chip button{background:none;border:none;color:#666 !important;-webkit-text-fill-color:#666 !important;cursor:pointer;font-size:15px;padding:0;line-height:1;}
.cal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeUp 0.2s ease;}
.cal-box{background:#161616;border:1px solid #2a2a2a;border-radius:20px;padding:22px;width:340px;max-width:90vw;}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.cal-hdr-btn{background:none;border:none;color:#888;cursor:pointer;font-size:20px;padding:6px 10px;border-radius:8px;}
.cal-hdr-btn:active{background:#2a2a2a;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;}
.cal-day-hdr{font-size:10px;color:#888;font-weight:600;letter-spacing:1px;padding:6px 0;}
.cal-day{font-size:13px;font-weight:500;padding:10px 0;border-radius:10px;cursor:pointer;color:#888;transition:all 0.1s;}
.cal-day:active{transform:scale(0.92);}
.cal-day.cur-month{color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;}
.cal-day.today{background:rgba(255,255,255,0.1);font-weight:700;color:#fff;-webkit-text-fill-color:#fff;}
.cal-day.selected-week{background:rgba(255,255,255,0.06);}
.sched-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sched-nav-btn{background:none;border:1.5px solid #2a2a2a;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;border-radius:10px;padding:8px 12px;cursor:pointer;font-size:16px;transition:all 0.1s;}
.sched-nav-btn:active{background:#2a2a2a;}
.sched-week-label{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;text-align:center;}
.sched-week-dates{font-size:11px;color:#888;font-weight:500;text-align:center;margin-top:2px;}
/* ── STATS TAB ── */
.stats-period-row{display:flex;gap:8px;margin-bottom:20px;}
.stats-period-btn{flex:1;background:#1f1f1f;border:1.5px solid #2a2a2a;color:#888;-webkit-text-fill-color:#888;border-radius:12px;padding:10px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;}
.stats-period-btn.sel{border-color:#ffffff;color:#ffffff;-webkit-text-fill-color:#ffffff;background:#1f1f1f;}
.chart-card{background:#161616;border:1px solid #2a2a2a;border-radius:16px;padding:18px;margin-bottom:14px;}
.chart-title{font-size:11px;color:#888;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
.heatmap-body{display:flex;justify-content:center;margin:4px 0 12px;}
.heatmap-legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
.heatmap-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:#888;-webkit-text-fill-color:#888;font-weight:500;}
.heatmap-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.pr-row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:#161616;border:1px solid #2a2a2a;border-radius:14px;margin-bottom:8px;}
.pr-row.pr-top{border-color:var(--accent);background:var(--accent-soft);}
.pr-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:#444;width:24px;flex-shrink:0;text-align:center;}
.pr-top .pr-rank{color:var(--accent);-webkit-text-fill-color:var(--accent);}
.pr-name{flex:1;font-size:14px;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pr-val{text-align:right;flex-shrink:0;}
.pr-est{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;}
.pr-top .pr-est{color:var(--accent);-webkit-text-fill-color:var(--accent);}
.pr-sub{font-size:11px;color:#666;font-weight:500;margin-top:1px;}
.onerm-row{display:flex;gap:10px;margin-bottom:4px;}

function defaultData(){return{xp:0,streak:0,lastDate:null,workouts:[],schedule:emptySchedule(),checked:{},friends:[],schedChecks:{},schedStart:null,schedEnd:null};}
function emptySchedule(){return['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].reduce((a,d)=>({...a,[d]:{label:'',exercises:[],note:''}}),{});}

function switchAuthTab(t){
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='register')));
  document.getElementById('login-form').style.display=t==='login'?'block':'none';
  document.getElementById('register-form').style.display=t==='register'?'block':'none';
}

async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim().toLowerCase();
  const pass=document.getElementById('reg-password').value;
  const err=document.getElementById('reg-err');
  if(!name||!email||!pass){err.textContent='All fields are required.';return;}
  if(pass.length<6){err.textContent='Password must be at least 6 characters.';return;}
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
    const username=name.toLowerCase().replace(/\s+/g,'_')+'_'+cred.user.uid.slice(0,4);
    await fdb.collection('users').doc(cred.user.uid).set({
      name,email,username,nameLower:name.toLowerCase(),
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      ...defaultData()
    });
    err.textContent='';
  }catch(e){
    const msgs={'auth/email-already-in-use':'An account with this email already exists.','auth/invalid-email':'Invalid email address.','auth/weak-password':'Password must be at least 6 characters.'};
    err.textContent=msgs[e.code]||e.message;
  }
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pass=document.getElementById('login-password').value;
  const err=document.getElementById('login-err');
  try{
    await auth.signInWithEmailAndPassword(email,pass);
    err.textContent='';
  }catch(e){
    err.textContent='Incorrect email or password.';
  }
}

async function doGoogle(){
  const provider=new firebase.auth.GoogleAuthProvider();
  try{
    if(isStandalone){
      await auth.signInWithRedirect(provider);
    }else{
      const result=await auth.signInWithPopup(provider);
      if(result.additionalUserInfo&&result.additionalUserInfo.isNewUser){
        const u=result.user;
        const username=(u.displayName||'user').toLowerCase().replace(/\s+/g,'_')+'_'+u.uid.slice(0,4);
        await fdb.collection('users').doc(u.uid).set({
          name:u.displayName||'User',email:u.email,username,
          createdAt:firebase.firestore.FieldValue.serverTimestamp(),
          ...defaultData()
        });
      }
    }
  }catch(e){
    if(e.code!=='auth/popup-closed-by-user')console.error('Google sign-in error:',e);
  }
}

async function doGuest(){
  try{await auth.signInAnonymously();}catch(e){console.error('Anonymous auth failed:',e);}
}

async function upgradeGuest(email,password,name){
  const credential=firebase.auth.EmailAuthProvider.credential(email,password);
  try{
    const result=await auth.currentUser.linkWithCredential(credential);
    await result.user.updateProfile({displayName:name});
    const username=name.toLowerCase().replace(/\s+/g,'_')+'_'+result.user.uid.slice(0,4);
    await fdb.collection('users').doc(result.user.uid).update({name,email,username});
    isGuest=false;currentUser.name=name;currentUser.email=email;currentUser.username=username;
    document.getElementById('guest-badge-hdr').innerHTML='';
    render();
  }catch(e){
    return e.code==='auth/email-already-in-use'?'An account with this email already exists.':e.message;
  }
  return null;
}
async function doUpgrade(){

}

async function getUserData(uid){
  const docRef=fdb.collection('users').doc(uid);
  const doc=await docRef.get();
  if(!doc.exists)return defaultData();
  const data=doc.data();
  const workoutSnap=await docRef.collection('workouts').orderBy('createdAt','desc').limit(50).get();
  data.workouts=workoutSnap.docs.map(d=>d.data());
  return{...defaultData(),...data};
}

function save(){
  if(!currentUser)return;
  const uid=currentUser.uid;
  fdb.collection('users').doc(uid).update({
    xp:UD.xp,streak:UD.streak,lastDate:UD.lastDate,
    schedule:UD.schedule,checked:UD.checked,friends:UD.friends
  }).catch(err=>console.error('Save failed:',err));
  updateHeader();
}

async function migrateLocalData(firebaseUid){
  const migrationKey='mu_migrated_'+firebaseUid;
  if(localStorage.getItem(migrationKey))return;
  let oldData=null;
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key&&key.startsWith('mu_data_')){
      try{
        const candidate=JSON.parse(localStorage.getItem(key));
        if(candidate&&((candidate.workouts&&candidate.workouts.length>0)||candidate.xp>0)){
          oldData=candidate;break;
        }
      }catch(e){}
    }
  }
  if(!oldData){localStorage.setItem(migrationKey,'done');return;}
  const docRef=fdb.collection('users').doc(firebaseUid);
  const existing=await docRef.get();
  const existingData=existing.exists?existing.data():{};
  if((existingData.xp||0)>=(oldData.xp||0)){localStorage.setItem(migrationKey,'done');return;}
  await docRef.set({
    xp:oldData.xp||0,streak:oldData.streak||0,lastDate:oldData.lastDate||null,
    schedule:oldData.schedule||emptySchedule(),checked:oldData.checked||{},friends:oldData.friends||[]
  },{merge:true});
  if(oldData.workouts&&oldData.workouts.length>0){
    const batch=fdb.batch();
    for(const w of oldData.workouts){
      const wRef=docRef.collection('workouts').doc(w.id||'w_'+Date.now()+Math.random());
      batch.set(wRef,{...w,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
    await batch.commit();
  }
  localStorage.setItem(migrationKey,'done');
  console.log('Migration complete: moved localStorage data to Firestore');
}

// ── AUTH STATE LISTENER (replaces auto-login) ────────────────
auth.onAuthStateChanged(async(user)=>{
  if(user){
    isGuest=user.isAnonymous;
    currentUser={uid:user.uid,name:user.displayName||'Guest',email:user.email,username:null};
    const docRef=fdb.collection('users').doc(user.uid);
    const doc=await docRef.get();
    if(doc.exists){
      currentUser.username=doc.data().username;
      currentUser.name=doc.data().name||currentUser.name;
      // Backfill nameLower if missing
      if(!doc.data().nameLower&&currentUser.name){
        docRef.update({nameLower:currentUser.name.toLowerCase()}).catch(()=>{});
      }
    }else if(!user.isAnonymous){
      const username=(currentUser.name||'user').toLowerCase().replace(/\s+/g,'_')+'_'+user.uid.slice(0,4);
      await docRef.set({name:currentUser.name,email:currentUser.email,username,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),...defaultData()});
      currentUser.username=username;
    }else{
      const username='guest_'+user.uid.slice(0,6);
      await docRef.set({name:'Guest',username,...defaultData()});
      currentUser.username=username;
    }
    await migrateLocalData(user.uid);
    startApp();
  }else{
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('main-app').classList.remove('visible');
  }
});

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

  root.style.setProperty('--accent-soft',hexToRgba(prefs.accent,0.1));

function getGreeting(){
  const h=new Date().getHours();
  if(h<12)return'Good morning';if(h<17)return'Good afternoon';return'Good evening';
}
function getWeekDots(){
  const now=new Date();const day=now.getDay();const diff=day===0?-6:1-day;
  const mon=new Date(now.getFullYear(),now.getMonth(),now.getDate()+diff);
  const dots=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const ds=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    const hasWorkout=UD.workouts.some(w=>w.date===ds);
    const isToday=d.toDateString()===now.toDateString();
    dots.push({day:DAYS_S[i],active:hasWorkout,today:isToday});
  }
  return dots;
}
function getPersonalRecords(){
  const prs={};
  for(const w of UD.workouts){
    for(const ex of w.exercises){
      for(const s of ex.sets){
        if(s.weight>0&&(!prs[ex.name]||s.weight>prs[ex.name].weight)){
          prs[ex.name]={weight:s.weight,reps:s.reps};
        }
      }
    }
  }
  return Object.entries(prs).sort((a,b)=>b[1].weight-a[1].weight).slice(0,5);
}

// ── AI HELPERS ────────────────────────────────────────────────
function getExerciseCategory(name){
  for(const cat of Object.keys(EX)){
    if(EX[cat].includes(name))return cat;
  }
  return null;
}
function getLastPerformance(name){
  for(const w of UD.workouts){
    const ex=w.exercises.find(e=>e.name===name);
    if(ex&&ex.sets.length)return ex.sets[0];
  }
  return null;
}
function applySuggestion(ei,reps,weight){
  nw.exercises[ei].sets[0]={reps,weight};
  render();
}
function getMuscleBalance(){
  const counts={};
  for(const w of UD.workouts){
    for(const ex of w.exercises){
      const cat=getExerciseCategory(ex.name)||'Other';
      counts[cat]=(counts[cat]||0)+ex.sets.length;
    }
  }
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  return Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .map(([cat,sets])=>({cat,sets,pct:Math.round(sets/total*100)}));
}
function buildAIContext(){
  const level=Math.floor(UD.xp/1000);
  const recentWorkouts=UD.workouts.slice(0,5).map(w=>
    `${w.date} — ${w.title}: `+
    w.exercises.map(e=>e.name+' ('+e.sets.map(s=>s.weight+'kg×'+s.reps).join(', ')+')').join('; ')
  ).join('\n');
  const balance=getMuscleBalance().map(b=>`${b.cat}: ${b.pct}%`).join(', ');
  return{name:currentUser.name,level,xp:UD.xp,streak:UD.streak,workoutCount:UD.workouts.length,recentWorkouts,muscleBalance:balance};
}

function toggleAIChat(){
  aiChatOpen=!aiChatOpen;

  if(aiChatOpen&&aiChat.length===0){

    renderChatMessages();

}
function renderChatMessages(){
  const box=document.getElementById('ai-messages');
  if(!box)return;
  box.innerHTML=aiChat.map(m=>
    m.role==='assistant'
      ?`<div class="ai-bubble ai-bubble-ai">${m.text.replace(/\n/g,'<br>')}</div>`
      :`<div class="ai-bubble ai-bubble-user">${m.text}</div>`
  ).join('')+(aiTyping?'<div class="ai-typing"><span></span><span></span><span></span></div>':'');
  box.scrollTop=box.scrollHeight;
}
async function sendAIChat(msgOverride){
  const input=document.getElementById('ai-input');
  const msg=msgOverride||(input&&input.value.trim());
  if(!msg||aiTyping)return;
  if(input)input.value='';
  aiChat.push({role:'user',text:msg});
  aiTyping=true;
  renderChatMessages();
  try{
    const ctx=buildAIContext();
    const history=aiChat.slice(-10).map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.text}]}));
    const res=await fetch('/api/coach',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'chat',messages:history,context:ctx})
    });
    const data=await res.json();
    aiTyping=false;
    const text=data.text||'Sorry, I had trouble responding. Try again!';
    aiChat.push({role:'assistant',text});
  }catch(e){
    aiTyping=false;
    aiChat.push({role:'assistant',text:'Connection error. Make sure you\'re online and try again.'});
  }
  renderChatMessages();
}

  try{

      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'generate',context:ctx,preferences:aiGenPrefs})

function getRecentExercises(){
  const seen=new Set();const recent=[];
  for(const w of UD.workouts){
    for(const e of w.exercises){
      if(!seen.has(e.name)){seen.add(e.name);recent.push(e.name);}
      if(recent.length>=8)return recent;
    }
  }
  return recent;
}
function getSearchResults(q){
  if(!q)return[];
  const lower=q.toLowerCase();const results=[];
  for(const cat of Object.keys(EX)){
    for(const ex of EX[cat]){
      if(ex.toLowerCase().includes(lower))results.push({name:ex,cat});
    }
  }
  return results;
}

function setSelCat(c){selCat=c;render();}
function addEx(name){
  if(!nw.exercises.find(e=>e.name===name)){
    // Carry forward last used weight for this exercise
    const prev=UD.workouts.flatMap(w=>w.exercises).find(e=>e.name===name);
    const lastSet=prev?.sets?.at(-1);
    nw.exercises.push({name,sets:[{reps:lastSet?.reps||10,weight:lastSet?.weight||0}]});
    render();
  }
}
function updSet(ei,si,f,v){nw.exercises[ei].sets[si][f]=Math.max(0,Number(v)||0);}
function stepVal(ei,si,f,delta){
  const cur=nw.exercises[ei].sets[si][f];
  const next=Math.max(0,Math.round((cur+delta)*10)/10);
  nw.exercises[ei].sets[si][f]=next;
  // Update just the input value without full re-render for smoothness
  const inputs=document.querySelectorAll('.stepper-val');
  let idx=0;
  nw.exercises.forEach((ex,i)=>ex.sets.forEach((s,j)=>{

      if(f==='reps'&&inputs[idx])inputs[idx].value=next;
      if(f==='weight'&&inputs[idx+1])inputs[idx+1].value=next;
    }
    idx+=2;
  }));
}

function finishWorkout(){

  const earned=nw.exercises.reduce((a,e)=>a+e.sets.length*20,0);

      UD.workouts[idx]={...old,title:nw.title,exercises:JSON.parse(JSON.stringify(nw.exercises)),xpEarned:earned};

  }

  UD.workouts.unshift(workout);

  const ts=new Date().toDateString();
  if(UD.lastDate!==ts){
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    if(UD.lastDate===yesterday.toDateString()){UD.streak++;}else if(UD.lastDate!==null){UD.streak=1;}else{UD.streak=1;}

  fdb.collection('users').doc(currentUser.uid).collection('workouts').doc(workout.id).set(workout).catch(err=>console.error('Workout save failed:',err));

}

// ── SCHEDULE ──────────────────────────────────────────────────
function getWeekMonday(offset){
  const now=new Date();const day=now.getDay();const diff=day===0?-6:1-day;
  const mon=new Date(now.getFullYear(),now.getMonth(),now.getDate()+diff+(offset*7));
  mon.setHours(0,0,0,0);return mon;
}
function fmtDate(d){return d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];}
function fmtDateFull(d){return d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getFullYear();}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function changeWeek(dir){weekOffset+=dir;showCalendar=false;render();}
function goToThisWeek(){weekOffset=0;showCalendar=false;render();}
function toggleCalendar(){showCalendar=!showCalendar;render();}
function calPickWeek(y,m,d){
  const picked=new Date(y,m,d);const today=new Date();today.setHours(0,0,0,0);
  const todayDay=today.getDay();const todayDiff=todayDay===0?-6:1-todayDay;
  const thisMon=new Date(today.getFullYear(),today.getMonth(),today.getDate()+todayDiff);
  const pickedDay=picked.getDay();const pickedDiff=pickedDay===0?-6:1-pickedDay;
  const pickedMon=new Date(picked.getFullYear(),picked.getMonth(),picked.getDate()+pickedDiff);
  weekOffset=Math.round((pickedMon-thisMon)/(7*24*60*60*1000));
  showCalendar=false;render();
}
let calViewMonth=null,calViewYear=null;
function calNav(dir){
  if(calViewMonth===null){const n=new Date();calViewMonth=n.getMonth();calViewYear=n.getFullYear();}
  calViewMonth+=dir;
  if(calViewMonth>11){calViewMonth=0;calViewYear++;}
  if(calViewMonth<0){calViewMonth=11;calViewYear--;}
  render();
}
function renderCalendarModal(){
  const now=new Date();
  if(calViewMonth===null){calViewMonth=now.getMonth();calViewYear=now.getFullYear();}
  const m=calViewMonth,y=calViewYear;
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay=new Date(y,m,1).getDay();const startOff=firstDay===0?6:firstDay-1;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const mon=getWeekMonday(weekOffset);const sun=new Date(mon);sun.setDate(sun.getDate()+6);
  const hdrs=['M','T','W','T','F','S','S'].map(d=>`<div class="cal-day-hdr">${d}</div>`).join('');
  let cells='';
  const prevDays=new Date(y,m,0).getDate();
  for(let i=startOff-1;i>=0;i--){
    const dd=prevDays-i;cells+=`<div class="cal-day" onclick="calPickWeek(${m===0?y-1:y},${m===0?11:m-1},${dd})">${dd}</div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(y,m,d);
    const isToday=isSameDay(dt,now);
    const inWeek=dt>=mon&&dt<=sun;
    cells+=`<div class="cal-day cur-month${isToday?' today':''}${inWeek?' selected-week':''}" onclick="calPickWeek(${y},${m},${d})">${d}</div>`;
  }
  const totalCells=startOff+daysInMonth;const remaining=(7-totalCells%7)%7;
  for(let d=1;d<=remaining;d++){
    cells+=`<div class="cal-day" onclick="calPickWeek(${m===11?y+1:y},${m===11?0:m+1},${d})">${d}</div>`;
  }
  return`<div class="cal-overlay" onclick="toggleCalendar()"><div class="cal-box" onclick="event.stopPropagation()">
    <div class="cal-hdr">
      <button class="cal-hdr-btn" onclick="calNav(-1)">‹</button>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px">${monthNames[m]} ${y}</div>
      <button class="cal-hdr-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">${hdrs}${cells}</div>
    ${weekOffset!==0?`<button class="btn-primary" style="margin-top:16px" onclick="goToThisWeek()">Back to This Week</button>`:''}
  </div></div>`;
}

function isoMonday(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  const day=d.getDay(),diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10);
}
function addWeeksToISO(isoDate,weeks){
  const d=new Date(isoDate+'T00:00:00');d.setDate(d.getDate()+weeks*7);return d.toISOString().slice(0,10);
}
function setSchedDuration(weeks){
  if(!UD.schedStart)UD.schedStart=isoMonday(new Date());
  UD.schedEnd=weeks===0?null:addWeeksToISO(UD.schedStart,weeks);
  confirmDeleteSched=false;save();render();
}
function renewSched(){
  // Extend from today's monday for the same duration (or 4 weeks default)
  const prevDur=UD.schedStart&&UD.schedEnd?Math.round((new Date(UD.schedEnd)-new Date(UD.schedStart))/(7*24*60*60*1000)):4;
  UD.schedStart=isoMonday(new Date());
  UD.schedEnd=addWeeksToISO(UD.schedStart,prevDur||4);
  weekOffset=0;save();render();
}
function deleteSchedule(){
  UD.schedule=emptySchedule();UD.schedStart=null;UD.schedEnd=null;
  UD.schedChecks={};confirmDeleteSched=false;save();render();
}
function hasAnySchedule(){
  return DAYS.some(d=>UD.schedule[d].exercises.length>0||UD.schedule[d].label);
}
function getWeekStatus(){
  // Returns 'active'|'expired'|'future'|'nolimit'
  if(!UD.schedStart)return'nolimit';
  const mon=getWeekMonday(weekOffset).toISOString().slice(0,10);
  if(mon<UD.schedStart)return'future';
  if(UD.schedEnd&&mon>UD.schedEnd)return'expired';
  return'active';
}
function getWeekProgress(){
  let total=0,done=0;
  const key=getWeekKey();
  DAYS.forEach(day=>{

  return{total,done};
}

let rivalData=[];
async function loadRivalData(){
  const promises=UD.friends.map(async uname=>{
    const snap=await fdb.collection('users').where('username','==',uname).limit(1).get();
    if(snap.empty)return null;
    const d=snap.docs[0].data();
    return{name:d.name,username:d.username,xp:d.xp||0,streak:d.streak||0};
  });
  rivalData=(await Promise.all(promises)).filter(Boolean);
}

async function tryAddFriend(){
  const val=addFriendInput.trim().toLowerCase();
  if(!val){addFriendMsg='Enter your friend\'s name.';addFriendOk=false;render();return;}
  if(isGuest){addFriendMsg='Create an account to add friends!';addFriendOk=false;render();return;}
  // Search by nameLower, then username, then brute-force name match
  let snap=await fdb.collection('users').where('nameLower','==',val).limit(1).get();
  if(snap.empty) snap=await fdb.collection('users').where('username','==',val).limit(1).get();
  if(snap.empty){
    // Fallback: scan all users and match by name (handles accounts missing nameLower)
    const all=await fdb.collection('users').get();
    const match=all.docs.find(d=>d.data().name&&d.data().name.toLowerCase()===val);
    if(match){
      // Backfill nameLower on their doc won't work (permissions), but we can still use the data
      snap={empty:false,docs:[match]};
    }
  }
  if(snap.empty){addFriendMsg='No account found. Make sure they\'ve signed up!';addFriendOk=false;render();return;}
  const fd=snap.docs[0].data();
  if(fd.username===currentUser.username){addFriendMsg="That's you! Add your friends instead.";addFriendOk=false;render();return;}
  if(UD.friends.includes(fd.username)){addFriendMsg=`${fd.name} is already your rival!`;addFriendOk=false;render();return;}
  UD.friends.push(fd.username);save();
  addFriendMsg=`${fd.name} added as rival! 🔥`;addFriendOk=true;addFriendInput='';
  await loadRivalData();render();
}

const MONTH_NAMES={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function parseWorkoutDate(str){
  if(!str)return new Date();
  const parts=str.split(' ');
  if(parts.length<2)return new Date();
  return new Date(new Date().getFullYear(),MONTH_NAMES[parts[1]]||0,parseInt(parts[0])||1);
}
function calcVolume(w){
  return w.exercises.reduce((a,e)=>a+e.sets.reduce((b,s)=>b+(s.weight||0)*(s.reps||0),0),0);
}
function getVolumeHistory(n=8){
  return UD.workouts.slice(0,n).reverse().map(w=>({v:calcVolume(w),date:w.date,label:w.title.split(' ')[0]}));
}
function calc1RM(weight,reps){
  if(!weight||!reps)return 0;
  return Math.round(weight*(1+reps/30));
}
function getTopExercises(n=3){
  const freq={};
  for(const w of UD.workouts)
    for(const ex of w.exercises)
      if(ex.sets.some(s=>s.weight>0))freq[ex.name]=(freq[ex.name]||0)+1;
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([name])=>name);
}
function getBest1RMHistory(name,n=6){
  // Returns last n appearances of this exercise with best est1RM per session
  const out=[];
  for(const w of [...UD.workouts].reverse()){
    const ex=w.exercises.find(e=>e.name===name);
    if(!ex)continue;
    const best=Math.max(...ex.sets.map(s=>calc1RM(s.weight,s.reps)));
    if(best>0)out.push({v:best,date:w.date});
    if(out.length>=n)break;
  }
  return out;
}
function getPRTimeline(){
  const prs={};
  for(const w of [...UD.workouts].reverse()){
    for(const ex of w.exercises){
      for(const s of ex.sets){
        const est=calc1RM(s.weight,s.reps);
        if(s.weight>0&&(!prs[ex.name]||est>prs[ex.name].est1RM)){
          prs[ex.name]={weight:s.weight,reps:s.reps,est1RM:est,date:w.date,workoutTitle:w.title};
        }
      }
    }
  }
  return Object.entries(prs).map(([name,v])=>({name,...v})).sort((a,b)=>b.est1RM-a.est1RM).slice(0,8);
}
function getPeriodStats(period){
  const now=new Date();const cutoff=new Date(now);
  cutoff.setDate(now.getDate()-(period==='month'?30:7));
  const ws=UD.workouts.filter(w=>parseWorkoutDate(w.date)>=cutoff);
  const days=new Set(ws.map(w=>w.date)).size;
  const volume=ws.reduce((a,w)=>a+calcVolume(w),0);
  const sets=ws.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.length,0),0);
  return{workouts:ws.length,volume:Math.round(volume/1000*10)/10,sets,days};
}
function svgLineChart(data,{color='#4a9eff',h=110}={}){
  if(!data||data.length<2)return`<div style="color:#555;font-size:13px;text-align:center;padding:30px 0;line-height:1.6">Log 2+ workouts<br>to see your trend</div>`;
  const W=320,H=h,padL=10,padR=10,padT=16,padB=24;
  const vals=data.map(d=>d.v);
  const min=Math.min(...vals),max=Math.max(...vals);
  const range=max-min||1;
  const px=i=>padL+(i/(data.length-1))*(W-padL-padR);
  const py=v=>padT+(1-(v-min)/range)*(H-padT-padB);
  const pts=data.map((d,i)=>`${px(i).toFixed(1)},${py(d.v).toFixed(1)}`);
  const pathD=`M ${pts.join(' L ')}`;
  const areaD=`M ${px(0).toFixed(1)},${H-padB} L ${pts.join(' L ')} L ${px(data.length-1).toFixed(1)},${H-padB} Z`;
  const uid='cg'+Math.random().toString(36).slice(2,6);
  const dots=data.map((d,i)=>{
    const isLast=i===data.length-1;
    return`<circle cx="${px(i).toFixed(1)}" cy="${py(d.v).toFixed(1)}" r="${isLast?5:3}" fill="${color}" opacity="${isLast?1:0.5}"/>
    ${isLast?`<text x="${px(i).toFixed(1)}" y="${(py(d.v)-9).toFixed(1)}" fill="${color}" font-size="11" text-anchor="middle" font-family="DM Sans,sans-serif" font-weight="700">${d.label||d.v}</text>`:''}`;
  }).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible">
    <defs><linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaD}" fill="url(#${uid})"/>
    <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    <text x="${padL}" y="${H}" fill="#555" font-size="10" font-family="DM Sans,sans-serif">${data[0].date}</text>
    <text x="${W-padR}" y="${H}" fill="#555" font-size="10" font-family="DM Sans,sans-serif" text-anchor="end">${data[data.length-1].date}</text>
  </svg>`;
}
function heatColor(sets){
  if(!sets)return'#1f1f1f';
  if(sets<=3)return'rgba(74,158,255,0.22)';
  if(sets<=8)return'rgba(74,158,255,0.55)';
  return'#4a9eff';
}

    for(const ex of w.exercises){
      const cat=getExerciseCategory(ex.name);
      if(cat)bal[cat]=(bal[cat]||0)+ex.sets.length;
    }
  }
  const c=cat=>heatColor(bal[cat]||0);
  const lbl=cat=>`<text text-anchor="middle" font-size="8" fill="#aaa" font-family="DM Sans,sans-serif" font-weight="600">${bal[cat]||0}</text>`;

    <!-- Head -->
    <ellipse cx="80" cy="22" rx="17" ry="18" fill="#2a2a2a"/>
    <!-- Neck -->
    <rect x="73" y="38" width="14" height="12" rx="5" fill="#2a2a2a"/>
    <!-- L Shoulder -->
    <ellipse cx="38" cy="64" rx="20" ry="13" fill="${c('Shoulders')}"/>
    <!-- R Shoulder -->
    <ellipse cx="122" cy="64" rx="20" ry="13" fill="${c('Shoulders')}"/>
    <!-- Chest -->
    <ellipse cx="80" cy="82" rx="30" ry="22" fill="${c('Push')}"/>
    <!-- L Arm upper -->

    <!-- R Arm upper -->
    <ellipse cx="138" cy="98" rx="12" ry="26" fill="${c('Arms')}"/>
    <!-- L Forearm -->
    <ellipse cx="16" cy="145" rx="9" ry="20" fill="${c('Arms')}" opacity="0.7"/>
    <!-- R Forearm -->
    <ellipse cx="144" cy="145" rx="9" ry="20" fill="${c('Arms')}" opacity="0.7"/>
    <!-- Core / Abs -->
    <rect x="52" y="102" width="56" height="56" rx="10" fill="${c('Core')}"/>
    <!-- Upper back stripe (Pull) — shown as darker overlay inside torso -->
    <rect x="52" y="102" width="56" height="22" rx="10" fill="${c('Pull')}" opacity="0.6"/>
    <!-- L Quad -->
    <ellipse cx="62" cy="210" rx="21" ry="52" fill="${c('Legs')}"/>
    <!-- R Quad -->
    <ellipse cx="98" cy="210" rx="21" ry="52" fill="${c('Legs')}"/>
    <!-- L Calf -->
    <ellipse cx="60" cy="270" rx="13" ry="18" fill="${c('Legs')}" opacity="0.7"/>
    <!-- R Calf -->
    <ellipse cx="100" cy="270" rx="13" ry="18" fill="${c('Legs')}" opacity="0.7"/>
    <!-- Labels -->
    <text x="80" y="86" text-anchor="middle" font-size="8" fill="${bal['Push']?'#fff':'#555'}" font-family="DM Sans,sans-serif" font-weight="700">CHEST</text>
    <text x="38" y="68" text-anchor="middle" font-size="7" fill="${bal['Shoulders']?'#fff':'#555'}" font-family="DM Sans,sans-serif" font-weight="700">DELT</text>
    <text x="122" y="68" text-anchor="middle" font-size="7" fill="${bal['Shoulders']?'#fff':'#555'}" font-family="DM Sans,sans-serif" font-weight="700">DELT</text>
    <text x="22" y="100" text-anchor="middle" font-size="7" fill="${bal['Arms']?'#fff':'#555'}" font-family="DM Sans,sans-serif" font-weight="700">ARM</text>
    <text x="138" y="100" text-anchor="middle" font-size="7" fill="${bal['Arms']?'#fff':'#555'}" font-family="DM Sans,sans-serif" font-weight="700">ARM</text>
    <text x="80" y="136" text-anchor="middle" font-size="8" fill="${bal['Core']?'#fff':'#555'}" font-family="DM Sans,sans-serif" font-weight="700">CORE</text>
    <text x="80" y="113" text-anchor="middle" font-size="7" fill="${bal['Pull']?'#fff':'#555'}" font-family="DM Sans,sans-serif" font-weight="700">BACK</text>
    <text x="62" y="212" text-anchor="middle" font-size="8" fill="${bal['Legs']?'#fff':'#555'}" font-family="DM Sans,sans-serif" font-weight="700">LEGS</text>
    <text x="98" y="212" text-anchor="middle" font-size="8" fill="${bal['Legs']?'#fff':'#555'}" font-family="DM Sans,sans-serif" font-weight="700">LEGS</text>
  </svg>`;
}
function renderStats(){
  const st=getPeriodStats(statsPeriod);
  const volHistory=getVolumeHistory(8);
  const topEx=getTopExercises(3);
  const prs=getPRTimeline();
  // Volume labels
  const volData=volHistory.map(d=>({...d,label:d.v>0?Math.round(d.v)+'kg':'0'}));
  // 1RM cards
  const onermCards=topEx.length?topEx.map(name=>{
    const hist=getBest1RMHistory(name,6);
    const best=hist.length?Math.max(...hist.map(d=>d.v)):0;
    const prev=getLastPerformance(name);
    const sub=prev?`${prev.weight}kg × ${prev.reps}`:'';
    const spark=hist.length>=2?svgLineChart(hist,{color:'#4a9eff',h:60}):'';
    return`<div class="onerm-card">
      <div class="onerm-val">${best||'—'}</div>
      <div class="onerm-name">${name}</div>
      ${sub?`<div class="onerm-sub">${sub}</div>`:''}
      ${spark?`<div style="margin-top:8px">${spark}</div>`:''}
    </div>`;
  }).join(''):`<div style="color:#555;font-size:13px;padding:20px 0;text-align:center">Log weighted exercises to track 1RM</div>`;
  // PR list
  const prHTML=prs.length?prs.map((p,i)=>`
    <div class="pr-row${i===0?' pr-top':''}">
      <div class="pr-rank">${i+1}</div>
      <div style="flex:1;min-width:0">
        <div class="pr-name">${p.name}</div>
        <div style="font-size:11px;color:#666;margin-top:1px">${p.date} · ${p.workoutTitle}</div>
      </div>
      <div class="pr-val">
        <div class="pr-est">~${p.est1RM} kg</div>
        <div class="pr-sub">${p.weight}kg × ${p.reps}</div>
      </div>
    </div>`).join(''):`<div style="color:#555;font-size:13px;padding:20px;text-align:center">Log weighted exercises to see your PRs</div>`;
  // Volume label for summary
  const volLabel=st.volume>=1?`${st.volume}t`:st.volume>0?`${Math.round(st.volume*1000)}kg`:'0kg';
  return`
    <div class="stats-period-row">
      <button class="stats-period-btn${statsPeriod==='week'?' sel':''}" onclick="statsPeriod='week';render()">This Week</button>
      <button class="stats-period-btn${statsPeriod==='month'?' sel':''}" onclick="statsPeriod='month';render()">This Month</button>
    </div>
    <div class="stat-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
      <div class="stat-cell"><div class="stat-val">${st.workouts}</div><div class="stat-key">Sessions</div></div>
      <div class="stat-cell"><div class="stat-val">${st.volume>0?st.volume+'t':'0'}</div><div class="stat-key">Volume</div></div>
      <div class="stat-cell"><div class="stat-val">${st.sets}</div><div class="stat-key">Sets</div></div>
      <div class="stat-cell"><div class="stat-val">${st.days}</div><div class="stat-key">Days</div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Volume Trend (last 8 sessions)</div>
      ${svgLineChart(volData)}
    </div>
    <div class="chart-card">
      <div class="chart-title">Estimated 1RM — Top Lifts</div>
      <div class="onerm-row">${onermCards}</div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Muscle Heatmap — last 30 sessions</div>
      <div class="heatmap-body">${renderMuscleHeatmap()}</div>
      <div class="heatmap-legend">
        <div class="heatmap-chip"><div class="heatmap-dot" style="background:#1f1f1f;border:1px solid #333"></div>None</div>
        <div class="heatmap-chip"><div class="heatmap-dot" style="background:rgba(74,158,255,0.22)"></div>1–3 sets</div>
        <div class="heatmap-chip"><div class="heatmap-dot" style="background:rgba(74,158,255,0.55)"></div>4–8 sets</div>
        <div class="heatmap-chip"><div class="heatmap-dot" style="background:#4a9eff"></div>9+ sets</div>
      </div>
    </div>
    <div class="section-lbl">PR Timeline — Est. 1RM</div>
    ${prHTML}`;
}

// ── PROFILE ───────────────────────────────────────────────────
function renderProfile(){
  const totalSets=UD.workouts.flatMap(w=>w.exercises).flatMap(e=>e.sets).length;
  const level=Math.floor(UD.xp/1000);
  const achs=[
    {icon:'🔥',label:'On Fire',desc:'5 day streak',done:UD.streak>=5},
    {icon:'👊',label:'First Rep',desc:'Log your first workout',done:UD.workouts.length>=1},
    {icon:'💪',label:'Grinder',desc:'Log 5 workouts',done:UD.workouts.length>=5},
    {icon:'🏆',label:'Beast Mode',desc:'Log 10 workouts',done:UD.workouts.length>=10},
    {icon:'⚡',label:'Electrified',desc:'Earn 1000 XP',done:UD.xp>=1000},
    {icon:'💎',label:'Diamond',desc:'30 day streak',done:UD.streak>=30},
  ];
  const achHTML=achs.map(a=>`
    <div style="background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;opacity:${a.done?1:0.35}">
      <div style="font-size:28px;width:44px;height:44px;background:#1f1f1f;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${a.icon}</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700">${a.label}</div><div style="font-size:12px;color:#888;margin-top:2px;font-weight:500">${a.desc}</div></div>
      ${a.done?'<div style="font-size:18px">✓</div>':''}
    </div>`).join('');

  const usernameInfo=!isGuest&&currentUser.username?`<div style="font-size:12px;color:#888;margin-top:4px;font-weight:500">@${currentUser.username} · share your name so friends can add you</div>`:'';
  const guestPrompt=isGuest?`<div style="background:#161616;border:1.5px dashed #2a2a2a;border-radius:14px;padding:18px;margin-bottom:20px">
    <div style="font-size:15px;font-weight:700;margin-bottom:6px">👋 You're a guest</div>
    <div style="font-size:13px;color:#888;font-weight:500;margin-bottom:14px;line-height:1.5">Your data is saved on this device only. Create a free account to keep your progress, add rivals, and compete with friends.</div>
    <div id="upgrade-form">
      <input class="text-input" style="margin-bottom:10px;font-size:14px" id="upgrade-name" placeholder="Your name"/>
      <input class="text-input" style="margin-bottom:10px;font-size:14px" id="upgrade-email" placeholder="Email" type="email"/>
      <input class="text-input" style="margin-bottom:10px;font-size:14px" id="upgrade-pass" placeholder="Password (min 6 chars)" type="password"/>
      <div class="err" id="upgrade-err" style="margin-bottom:10px"></div>
      <button class="btn-primary" onclick="doUpgrade()">Create Account & Keep Data →</button>
    </div>
  </div>`:'';

  return`
    <div style="background:#161616;border:1px solid #2a2a2a;border-radius:16px;padding:22px;margin-bottom:20px;text-align:center">
      <div style="width:64px;height:64px;background:#1f1f1f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px">${isGuest?'👋':'👤'}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;margin-bottom:4px">${currentUser.name.toUpperCase()}</div>
      <div style="font-size:13px;color:#888;font-weight:500">Level ${level} · ${UD.xp.toLocaleString()} XP total</div>
      ${usernameInfo}
    </div>
    ${renderPersonalize()}
    ${guestPrompt}
    <div class="stat-grid" style="margin-bottom:24px">
      <div class="stat-cell"><div class="stat-val">${UD.workouts.length}</div><div class="stat-key">Workouts</div></div>
      <div class="stat-cell"><div class="stat-val">${totalSets}</div><div class="stat-key">Sets</div></div>
      <div class="stat-cell"><div class="stat-val">${UD.streak}d</div><div class="stat-key">Streak</div></div>
    </div>
    <div class="section-lbl">Achievements</div>
    ${achHTML}
    ${(()=>{
      const bal=getMuscleBalance();
      if(!bal.length)return'';
      const bars=bal.map(b=>{
        const color=b.pct>=20?'#34d399':b.pct>=10?'#f59e0b':'#ef4444';
        return`<div class="balance-bar-wrap">
          <div class="balance-bar-label">
            <span style="font-size:13px;font-weight:600">${b.cat}</span>
            <span style="font-size:12px;color:#888;font-weight:500">${b.sets} sets · ${b.pct}%</span>
          </div>
          <div class="balance-bar-track"><div class="balance-bar-fill" style="width:${b.pct}%;background:${color}"></div></div>
        </div>`;
      }).join('');
      return`<div class="section-lbl" style="margin-top:24px">Muscle Balance</div>
        <div style="background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:16px;margin-bottom:12px">${bars}</div>`;
    })()}
    <div class="card" style="margin-top:8px;margin-bottom:16px">
      <div class="section-lbl">Pro</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:6px">Unlock Everything</div>
      <div style="font-size:13px;color:#888;font-weight:500;margin-bottom:6px">AI coaching · Unlimited rivals · Custom plans</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:16px">$4.99 / month</div>
      <button class="btn-primary">Go Pro →</button>
    </div>
    <button class="btn-danger" onclick="doLogout()">${isGuest?'Exit Guest Mode':'Sign Out'}</button>`;
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
</script>
